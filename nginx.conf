server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Route auth requests to the extracted auth-service
    location /api/v1/auth/ {
        proxy_pass http://auth-service:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Route employee endpoints to the extracted employee-service
    location = /api/v1/permissions {
        proxy_pass http://employee-service:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/employees {
        proxy_pass http://employee-service:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Route client endpoints to the extracted client-service
    location /api/v1/clients {
        proxy_pass http://client-service:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy API calls to backend
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy swagger endpoints to backend
    location /swagger {
        proxy_pass http://backend:8080;
    }

    # Vue SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
